<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>

      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZwbWdhbWFzcGVmd3F5d3R0ZHRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NzA0MDMsImV4cCI6MjA5MTE0NjQwM30.ymnJxCa2crnymc9607WUOHVZVI600fhpWICtjRp-23E'
    );
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080D1A;
      --surface: #0D1425;
      --surface2: #111C30;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --accent: #4F7EF7;
      --accent2: #7C5CFA;
      --text: #F1F5F9;
      --text2: #94A3B8;
      --text3: #475569;
      --green: #34D399;
      --red: #F87171;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }

    /* ── Nav ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: -0.3px;
      cursor: pointer;
    }
    .logo-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-link {
      color: var(--text2);
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .nav-link:hover { color: var(--text); }

    /* ── Main layout ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .signup-card {
      width: 100%;
      max-width: 440px;
    }

    .plan-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(79,126,247,0.12);
      border: 1px solid rgba(79,126,247,0.25);
      border-radius: 999px;
      padding: 5px 14px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 20px;
      text-transform: capitalize;
    }
    .plan-chip .plan-dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
    }
    .plan-chip.pro {
      background: rgba(124,92,250,0.12);
      border-color: rgba(124,92,250,0.25);
      color: #a78bfa;
    }
    .plan-chip.pro .plan-dot { background: #a78bfa; }
    .plan-chip.unlimited {
      background: rgba(52,211,153,0.1);
      border-color: rgba(52,211,153,0.2);
      color: var(--green);
    }
    .plan-chip.unlimited .plan-dot { background: var(--green); }

    h1 {
      font-size: 1.9rem;
      font-weight: 800;
      letter-spacing: -1.2px;
      line-height: 1.15;
      margin-bottom: 8px;
    }
    .sub {
      color: var(--text2);
      font-size: 0.95rem;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 6px;
      letter-spacing: 0.2px;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,126,247,0.15);
    }
    input.error {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(248,113,113,0.15);
    }

    .error-msg {
      display: none;
      color: var(--red);
      font-size: 0.82rem;
      margin-top: 6px;
    }
    .error-msg.visible { display: block; }

    .submit-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: white;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: -0.2px;
    }
    .submit-btn:hover { opacity: 0.92; }
    .submit-btn:active { transform: scale(0.99); }
    .submit-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--text3);
      font-size: 0.82rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .signin-link {
      text-align: center;
      font-size: 0.88rem;
      color: var(--text2);
    }
    .signin-link a {
      color: var(--accent);
      font-weight: 600;
    }
    .signin-link a:hover { text-decoration: underline; }

    .global-error {
      display: none;
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.25);
      border-radius: 8px;
      padding: 11px 14px;
      color: var(--red);
      font-size: 0.88rem;
      margin-bottom: 16px;
    }
    .global-error.visible { display: block; }

    .success-state {
      display: none;
      text-align: center;
      padding: 32px 0;
    }
    .success-state.visible { display: block; }
    .success-icon {
      width: 56px; height: 56px;
      background: rgba(52,211,153,0.12);
      border: 1px solid rgba(52,211,153,0.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }
    .success-state h2 {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.8px;
      margin-bottom: 8px;
    }
    .success-state p {
      color: var(--text2);
      font-size: 0.9rem;
    }

    @media (max-width: 480px) {
      nav { padding: 16px 20px; }
      h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<nav>
  <div class="logo" onclick="location.href='/'">
    <div class="logo-icon">
      <svg width="14" height="14" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
      </svg>
    </div>
    StudyEdge AI
  </div>
  <a href="/" class="nav-link">Back to home</a>
</nav>

<main>
  <div class="signup-card">

    <div id="form-state">
      <div class="plan-chip" id="plan-chip">
        <span class="plan-dot"></span>
        <span id="plan-label">Free plan</span>
      </div>

      <h1>Create your account</h1>
      <p class="sub">Start studying smarter today.</p>

      <div class="global-error" id="global-error"></div>

      <form id="signup-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@university.edu" autocomplete="email" required />
          <div class="error-msg" id="email-error">Please enter a valid email address.</div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password" required />
          <div class="error-msg" id="password-error">Password must be at least 8 characters.</div>
        </div>
        <button type="submit" class="submit-btn" id="submit-btn">Create account</button>
      </form>

      <div class="divider">or</div>

      <div class="signin-link">
        Already have an account? <a href="/app">Sign in</a>
      </div>
    </div>

    <div class="success-state" id="success-state">
      <div class="success-icon">
        <svg width="24" height="24" fill="none" stroke="#34D399" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <h2>Account created!</h2>
      <p>Redirecting you to the app…</p>
    </div>

  </div>
</main>

<script>
  // Read plan from query param
  const params = new URLSearchParams(location.search);
  const plan = (params.get('plan') || 'free').toLowerCase();

  const chip = document.getElementById('plan-chip');
  const label = document.getElementById('plan-label');
  const planNames = { free: 'Free plan', pro: 'Pro plan', unlimited: 'Unlimited plan' };
  label.textContent = planNames[plan] || 'Free plan';
  if (plan === 'pro') chip.classList.add('pro');
  if (plan === 'unlimited') chip.classList.add('unlimited');

  // Form submission
  document.getElementById('signup-form').addEventListener('submit', async e => {
    e.preventDefault();

    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const emailError = document.getElementById('email-error');
    const passwordError = document.getElementById('password-error');
    const globalError = document.getElementById('global-error');
    const btn = document.getElementById('submit-btn');

    // Reset errors
    emailInput.classList.remove('error');
    passwordInput.classList.remove('error');
    emailError.classList.remove('visible');
    passwordError.classList.remove('visible');
    globalError.classList.remove('visible');

    const email = emailInput.value.trim();
    const password = passwordInput.value;

    let valid = true;
    if (!email || !email.includes('@') || !email.includes('.')) {
      emailInput.classList.add('error');
      emailError.classList.add('visible');
      valid = false;
    }
    if (password.length < 8) {
      passwordInput.classList.add('error');
      passwordError.classList.add('visible');
      valid = false;
    }
    if (!valid) return;

    btn.disabled = true;
    btn.textContent = 'Creating account…';

    const { data, error } = await sb.auth.signUp({
      email,
      password,
      options: {
        data: { plan },
      },
    });

    if (error) {
      btn.disabled = false;
      btn.textContent = 'Create account';
      globalError.textContent = error.message || 'Something went wrong. Please try again.';
      globalError.classList.add('visible');
      return;
    }

    // Show success then redirect
    document.getElementById('form-state').style.display = 'none';
    document.getElementById('success-state').classList.add('visible');
    setTimeout(() => { location.href = 'https://getstudyedge.com/app'; }, 1800);
  });
</script>
</body>
</html>
