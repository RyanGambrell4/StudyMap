<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #080D1A;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: #fff;
    position: relative;
  }

  /* Grid background */
  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 44px 44px;
  }

  /* Glow orbs */
  .glow-1 {
    position: absolute;
    top: -120px; left: 50%;
    transform: translateX(-50%);
    width: 900px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(99,102,241,0.22) 0%, transparent 65%);
    filter: blur(60px);
  }
  .glow-2 {
    position: absolute;
    bottom: -100px; right: 0;
    width: 500px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(139,92,246,0.12) 0%, transparent 70%);
    filter: blur(80px);
  }

  /* Vignette edges */
  .vignette {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to right, rgba(8,13,26,0.85) 0%, transparent 20%, transparent 80%, rgba(8,13,26,0.85) 100%),
      linear-gradient(to bottom, rgba(8,13,26,0.5) 0%, transparent 15%, transparent 85%, rgba(8,13,26,0.5) 100%);
    pointer-events: none;
    z-index: 2;
  }

  /* Center content */
  .center {
    position: relative;
    z-index: 3;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 80px;
  }

  .brand-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
  }
  .brand-logo {
    width: 34px; height: 34px;
    border-radius: 9px;
    background: linear-gradient(135deg, #6366f1, #4f46e5);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 900; color: #fff;
    box-shadow: 0 0 20px rgba(99,102,241,0.55);
  }
  .brand-name {
    font-size: 14px; font-weight: 700;
    color: rgba(226,232,240,0.75);
    letter-spacing: 0.01em;
  }
  .brand-sep { color: rgba(226,232,240,0.2); }
  .brand-url {
    font-size: 14px; color: rgba(226,232,240,0.35); font-weight: 500;
  }

  .headline {
    font-size: 82px;
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -3px;
    color: #fff;
    margin-bottom: 22px;
  }
  .headline .line2 {
    background: linear-gradient(135deg, #a5b4fc 0%, #818cf8 50%, #6366f1 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    display: block;
  }

  .subhead {
    font-size: 20px;
    color: rgba(226,232,240,0.48);
    line-height: 1.55;
    font-weight: 400;
    max-width: 640px;
    margin-bottom: 36px;
  }

  .pills {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .pill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 18px;
    background: rgba(99,102,241,0.08);
    border: 1px solid rgba(99,102,241,0.18);
    border-radius: 999px;
    font-size: 13.5px;
    font-weight: 600;
    color: rgba(226,232,240,0.65);
  }
  .pill-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
  }
  .pill.live .pill-dot {
    background: #6ee7b7;
    box-shadow: 0 0 8px #6ee7b7;
  }
  .pill.stat .pill-dot { background: #6366f1; }
  .pill.streak .pill-dot { background: #fbbf24; }
</style>
  <script src="/utm-propagate.js" defer></script>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="vignette"></div>

  <div class="center">
    <div class="brand-row">
      <div class="brand-logo">S</div>
      <span class="brand-name">StudyEdge AI</span>
      <span class="brand-sep">&nbsp;·&nbsp;</span>
      <span class="brand-url">getstudyedge.com</span>
    </div>

    <h1 class="headline">
      While others cram.<br>
      <span class="line2">You execute.</span>
    </h1>

    <p class="subhead">
      AI that builds your study schedule, coaches every session,<br>
      and tracks your grades, every course, all semester.
    </p>

    <div class="pills">
      <div class="pill live">
        <div class="pill-dot"></div>
        Built for serious students
      </div>
      <div class="pill stat">
        <div class="pill-dot"></div>
        Study Coach · Grade Hub · Flashcards
      </div>
      <div class="pill streak">
        <div class="pill-dot"></div>
        9.6h studied this week
      </div>
    </div>
  </div>
</body>
</html>
