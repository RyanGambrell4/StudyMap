<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPA Calculator Embed | StudyEdge AI</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <style>
    :root {
      --bg: #ffffff;
      --bg-el: #F0EFEC;
      --border: rgba(0,0,0,0.08);
      --text: #111111;
      --muted: #6B6B6B;
      --accent: #3B61C4;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: transparent; font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif; color: var(--text); }
    .embed-wrap { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 18px; max-width: 520px; margin: 0 auto; }
    .embed-title { font-size: 16px; font-weight: 800; margin: 0 0 12px; letter-spacing: -0.01em; }
    .row { display: grid; grid-template-columns: 2fr 1fr 1fr 28px; gap: 6px; align-items: center; margin-bottom: 6px; }
    .row input, .row select { width: 100%; padding: 7px 8px; border: 1px solid var(--border); border-radius: 6px; font: inherit; font-size: 13px; background: #fff; color: var(--text); }
    .row button.rm { background: transparent; border: 1px solid var(--border); border-radius: 6px; height: 30px; cursor: pointer; color: var(--muted); font-size: 14px; padding: 0; }
    .head { display: grid; grid-template-columns: 2fr 1fr 1fr 28px; gap: 6px; margin-bottom: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }
    .actions { display: flex; gap: 8px; margin-top: 10px; }
    .add-btn { background: var(--accent); color: #fff; border: none; padding: 8px 14px; border-radius: 6px; font: inherit; font-weight: 700; cursor: pointer; font-size: 13px; }
    .result { margin-top: 12px; padding: 12px; background: var(--bg-el); border-radius: 8px; text-align: center; }
    .result .num { font-size: 28px; font-weight: 800; color: var(--accent); letter-spacing: -0.02em; line-height: 1; }
    .result .lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-top: 4px; }
    .credit { margin-top: 10px; font-size: 11px; color: var(--muted); text-align: center; }
    .credit a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .credit a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="embed-wrap">
  <h2 class="embed-title">GPA Calculator</h2>
  <div class="head">
    <div>Course</div>
    <div>Grade</div>
    <div>Credits</div>
    <div></div>
  </div>
  <div id="rows"></div>
  <div class="actions">
    <button class="add-btn" onclick="addRow()">+ Course</button>
  </div>
  <div class="result">
    <div class="num" id="gpa">0.00</div>
    <div class="lbl">GPA</div>
  </div>
  <div class="credit">
    Free GPA calculator from <a href="https://getstudyedge.com" target="_blank" rel="noopener">StudyEdge AI</a>
  </div>
</div>

<script>
  const GP = {
    'A+': 4.0, 'A': 4.0, 'A-': 3.7,
    'B+': 3.3, 'B': 3.0, 'B-': 2.7,
    'C+': 2.3, 'C': 2.0, 'C-': 1.7,
    'D+': 1.3, 'D': 1.0, 'D-': 0.7,
    'F': 0.0
  };
  let rid = 0;
  function addRow(name = '', grade = 'A', credits = 3) {
    const id = rid++;
    const d = document.createElement('div');
    d.className = 'row';
    d.dataset.id = id;
    d.innerHTML = `
      <input type="text" placeholder="Course" value="${name}" oninput="recompute()" />
      <select onchange="recompute()">
        ${Object.keys(GP).map(g => `<option value="${g}" ${g===grade?'selected':''}>${g}</option>`).join('')}
      </select>
      <input type="number" step="0.5" min="0" value="${credits}" oninput="recompute()" />
      <button class="rm" onclick="rm(${id})" aria-label="Remove">&times;</button>
    `;
    document.getElementById('rows').appendChild(d);
    recompute();
  }
  function rm(id) {
    const r = document.querySelector(`.row[data-id="${id}"]`);
    if (r) r.remove();
    recompute();
  }
  function recompute() {
    let pts = 0, cr = 0;
    document.querySelectorAll('.row').forEach(r => {
      const i = r.querySelectorAll('input, select');
      const g = i[1].value;
      const c = parseFloat(i[2].value) || 0;
      if (c <= 0) return;
      pts += (GP[g] ?? 0) * c;
      cr += c;
    });
    document.getElementById('gpa').textContent = cr > 0 ? (pts/cr).toFixed(2) : '0.00';
  }
  addRow('Course 1', 'A', 3);
  addRow('Course 2', 'B+', 4);
  addRow('Course 3', 'A-', 3);
</script>

</body>
</html>
