<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flashcard Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:transparent;font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;padding:0;display:inline-block}
:root{--blue:#4f7bff;--purple:#7c5cfc;--text:#e2e8f0;--dim:rgba(226,232,240,0.50);--muted:rgba(226,232,240,0.27);--card:rgba(255,255,255,0.040);--bdr:rgba(255,255,255,0.076)}
.panel{background:rgba(9,10,28,0.98);border-radius:16px;border:1px solid rgba(255,255,255,0.085);overflow:hidden;box-shadow:0 0 0 1px rgba(34,197,94,0.18),0 26px 52px rgba(0,0,0,0.60),0 0 55px rgba(34,197,94,0.08);width:240px}
.bb{display:flex;align-items:center;gap:5px;padding:10px 14px;background:rgba(255,255,255,0.030);border-bottom:1px solid rgba(255,255,255,0.062)}
.bd{width:9px;height:9px;border-radius:50%}
.bu{margin-left:8px;background:rgba(255,255,255,0.052);border-radius:6px;padding:4px 12px;font-size:11px;color:rgba(255,255,255,0.28)}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;border-bottom:1px solid var(--bdr)}
.ht{font-size:13px;font-weight:700;color:var(--text)}
.hp{font-size:11px;color:var(--muted)}
.body{padding:16px 15px 14px}
.face{background:linear-gradient(135deg,rgba(79,123,255,0.10),rgba(124,92,252,0.07));border:1px solid rgba(79,123,255,0.22);border-radius:12px;padding:18px 16px;text-align:center;margin-bottom:12px}
.side{font-size:10px;color:var(--blue);font-weight:700;letter-spacing:0.10em;margin-bottom:10px}
.q{font-size:15px;font-weight:800;color:#fff;line-height:1.3;margin-bottom:8px}
.a{font-size:11.5px;color:var(--dim);line-height:1.5}
.btns{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.fb{border-radius:8px;padding:9px 4px;text-align:center;font-size:12px;font-weight:700}
.hard{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.24);color:#ef4444}
.med{background:rgba(234,179,8,0.12);border:1px solid rgba(234,179,8,0.24);color:#eab308}
.easy{background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.24);color:#22c55e}
</style>
</head>
<body>
<div class="panel">
  <div class="bb"><div class="bd" style="background:#ff5f56"></div><div class="bd" style="background:#ffbd2e"></div><div class="bd" style="background:#27c93f"></div><div class="bu">Flashcards · FIN 3100</div></div>
  <div class="hdr"><div class="ht">🃏 Flashcards</div><div class="hp">7 / 24</div></div>
  <div class="body">
    <div class="face">
      <div class="side">ANSWER</div>
      <div class="q">What is the Federal Funds Rate?</div>
      <div class="a">The overnight lending rate between banks, set by the Fed as a primary monetary policy tool to influence borrowing costs economy-wide.</div>
    </div>
    <div class="btns">
      <div class="fb hard">Hard</div>
      <div class="fb med">Medium</div>
      <div class="fb easy">Easy ✓</div>
    </div>
  </div>
</div>
</body></html>
