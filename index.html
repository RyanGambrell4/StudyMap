<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyEdge: The Complete AI Study System for Students</title>
  <meta name="description" content="StudyEdge is the AI study system that schedules when you study, plans every session minute-by-minute, and coaches you through it with active recall, flashcards, and quizzes. Free to start." />
  <link rel="canonical" href="https://getstudyedge.com" />
  <link rel="icon" type="image/png" href="/favicon.png" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://getstudyedge.com" />
  <meta property="og:title" content="StudyEdge: The Complete AI Study System for Students" />
  <meta property="og:description" content="Build your study schedule automatically, plan every session minute-by-minute, and study smarter with built-in flashcards, quizzes, and active recall. Free to start." />
  <meta property="og:image" content="https://getstudyedge.com/hero-landing.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="StudyEdge" />

  <!-- Twitter / X Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@studyedge" />
  <meta name="twitter:title" content="StudyEdge: The Complete AI Study System for Students" />
  <meta name="twitter:description" content="Build your study schedule automatically, plan every session minute-by-minute, and study smarter with built-in flashcards, quizzes, and active recall. Free to start." />
  <meta name="twitter:image" content="https://getstudyedge.com/hero-landing.png" />

  <!-- Additional SEO meta -->
  <meta name="keywords" content="study planner app, AI study planner, study schedule app, student study tool, flashcard app, active recall app, study session planner, college study app" />
  <meta name="author" content="StudyEdge" />
  <meta name="robots" content="index, follow" />
  <meta name="google-site-verification" content="EzODCKZ9dRAeIbL_IemnmTgiTaQ6cvewKy3hg7Spx9M" />

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "StudyEdge",
    "url": "https://getstudyedge.com",
    "logo": "https://getstudyedge.com/favicon.png",
    "description": "AI-powered study planner that builds your study schedule, plans every session minute-by-minute, and coaches you through it with flashcards, quizzes, and active recall.",
    "applicationCategory": "EducationApplication",
    "operatingSystem": "Web",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD",
      "description": "Free plan available. Pro plans from $9/month."
    },
    "aggregateRating": {
      "@type": "AggregateRating",
      "ratingValue": "4.8",
      "ratingCount": "24"
    },
    "featureList": [
      "AI-generated study schedule",
      "Session Blueprint planner",
      "Focus Mode with active recall",
      "Built-in flashcards and quizzes",
      "Study streak tracking",
      "Syllabus import",
      "AI Study Coach"
    ]
  }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Landing page styles (v2 design) -->
  <link rel="stylesheet" href="/v2/styles.css" />
  <link rel="stylesheet" href="/v2/hero.css" />
  <link rel="stylesheet" href="/v2/sections.css" />
  <link rel="stylesheet" href="/v2/features.css" />
  <link rel="stylesheet" href="/v2/pricing.css" />

  <!-- Basic styles to avoid FOUC flash -->
  <style>
    html, body { background: #080914; color: #e6e9f2; margin: 0; }
    #root:empty::before {
      content: '';
      position: fixed; inset: 0;
      background: #080914;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel (in-browser compile of JSX) -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

  <!-- Landing page components -->
  <script type="text/babel" src="/v2/components/Hero.jsx"></script>
  <script type="text/babel" src="/v2/components/HowItWorks.jsx"></script>
  <script type="text/babel" src="/v2/components/Features.jsx"></script>
  <script type="text/babel" src="/v2/components/Pricing.jsx"></script>

  <script type="text/babel">
    function Nav(){
      return (
        <nav className="nav">
          <div className="nav-inner">
            <a className="logo" href="/" style={{textDecoration:'none'}}>
              <div className="logo-mark">
                <img src="/favicon.png" alt="StudyEdge" style={{width:'100%',height:'100%',objectFit:'contain',mixBlendMode:'screen'}} />
              </div>
              <span>StudyEdge</span>
            </a>
            <div className="nav-links hidden-sm">
              <a href="#features">Features</a>
              <a href="#how">How it works</a>
              <a href="#pricing">Pricing</a>
            </div>
            <div className="nav-cta">
              <a className="hidden-sm" href="/app" style={{fontSize:14,color:'var(--text-muted)',textDecoration:'none'}}>Sign in</a>
              <button className="btn btn-primary btn-sm" onClick={()=>window.location.href='/app?signup=1'}>Get Started Free</button>
            </div>
          </div>
        </nav>
      );
    }

    function App(){
      React.useEffect(()=>{
        const io = new IntersectionObserver((entries)=>{
          entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('in'); });
        },{threshold:0.12});
        document.querySelectorAll('.fade-up').forEach(el=>io.observe(el));
        return ()=>io.disconnect();
      },[]);
      return (
        <div className="page">
          <div className="grid-bg"/>
          <div className="noise"/>
          <Nav/>
          <Hero/>
          <StatsBar/>
          <section id="how"><HowItWorks/></section>
          <section id="features"><Bento/></section>
          <GradeIntel/>
          <section id="pricing"><Pricing/></section>
          <Testimonials/>
          <FinalCTA/>
          <Footer/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
